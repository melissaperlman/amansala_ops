// ═══════════════════════════════════════════════════════════════════════
// RETREATS TAB
// ═══════════════════════════════════════════════════════════════════════
function renderRetreatsTab() {
  const content = document.getElementById('mainContent');
  let html = '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px"><div style="font-family:Playfair Display,serif;font-size:22px;font-weight:600">Retreats</div>' +
    '<button class="btn-save" onclick="openRetreatModal()">+ New Retreat</button></div>';

  // Status filters
  const statuses = ['all', 'upcoming', 'active', 'completed'];
  html += '<div style="display:flex;gap:8px;margin-bottom:20px">';
  statuses.forEach(s => {
    const count = s === 'all' ? RETREATS.length : RETREATS.filter(r => r.status === s).length;
    html += '<button class="pill' + (s === 'all' ? ' active' : '') + '" onclick="filterRetreats(\'' + s + '\', this)">' + s.charAt(0).toUpperCase() + s.slice(1) + ' (' + count + ')</button>';
  });
  html += '</div>';

  // Retreat list
  const filtered = RETREATS.sort((a, b) => (b.week_start || '').localeCompare(a.week_start || ''));
  filtered.forEach(r => {
    const statusClass = 'status-' + (r.status || 'upcoming');
    const groups = GROUPS.filter(g => g.id !== 'all' && String(g.retreat_id) === String(r.id));
    const startDate = r.week_start ? new Date(r.week_start + 'T12:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) : '';
    const endDate = r.week_end ? new Date(r.week_end + 'T12:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) : '';

    html += '<div class="retreat-card">' +
      '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">' +
      '<div><span style="font-size:16px;font-weight:600">' + (r.name || 'Untitled') + '</span> <span style="font-size:13px;color:var(--muted);margin-left:8px">' + startDate + ' \u2013 ' + endDate + '</span></div>' +
      '<span class="status-pill ' + statusClass + '">' + (r.status || 'upcoming') + '</span></div>';

    // Groups for this retreat
    if (groups.length > 0) {
      html += '<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px">';
      groups.forEach(g => {
        // Form status
        const sub = PENDING_SUBMISSIONS.find(s => String(s.group_id) === String(g.id));
        let formStatus = 'Not Sent';
        let formColor = 'var(--muted)';
        let formBg = 'var(--bg)';
        if (sub) {
          if (sub.status === 'submitted') { formStatus = 'Submitted'; formColor = '#e8703a'; formBg = '#fff3e0'; }
          else if (sub.status === 'approved') { formStatus = 'Approved'; formColor = '#2e7d32'; formBg = '#e8f5e9'; }
          else if (sub.status === 'sent') { formStatus = 'Sent'; formColor = '#1565c0'; formBg = '#e8eaf6'; }
          else if (sub.status === 'opened') { formStatus = 'Opened'; formColor = '#8a5ba6'; formBg = '#f5e8ff'; }
        }
        html += '<div style="background:var(--card);border:1px solid var(--border);border-left:3px solid ' + (g.color || '#999') + ';border-radius:8px;padding:10px 14px;min-width:200px">' +
          '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px"><span style="font-weight:600;font-size:14px">' + g.label + '</span><span style="background:#1a1a1a;color:#fff;border-radius:4px;padding:1px 7px;font-size:11px;font-weight:700">' + (g.pax || 0) + '</span></div>' +
          '<div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">' +
          '<span style="font-size:11px;font-weight:600;color:' + formColor + ';background:' + formBg + ';border-radius:4px;padding:1px 6px">' + formStatus + '</span>';
        if (!sub || sub.status === 'sent' || sub.status === 'opened') {
          html += '<button onclick="sendForm(' + g.id + ')" style="font-size:11px;color:#1565c0;background:#e8eaf6;border:1px solid #90caf9;border-radius:4px;padding:1px 8px;cursor:pointer;font-family:inherit">\u{1F4E7} Send Form</button>';
        }
        if (sub && sub.status === 'submitted') {
          html += '<button onclick="openReviewModal(' + sub.id + ')" style="font-size:11px;color:#e8703a;background:#fff3e0;border:1px solid #f5c842;border-radius:4px;padding:1px 8px;cursor:pointer;font-family:inherit">\u{1F4CB} Review</button>';
        }
        html += '</div></div>';
      });
      html += '</div>';
    }

    html += '<button onclick="openGroupModal(' + r.id + ')" style="font-size:12px;color:var(--muted);background:none;border:1.5px dashed var(--border);border-radius:6px;padding:6px 14px;cursor:pointer;font-family:inherit">+ Add Group</button>';
    html += '</div>';
  });

  if (RETREATS.length === 0) {
    html += '<div class="empty-state">No retreats yet. Click "New Retreat" to get started.</div>';
  }
  content.innerHTML = html;
}

function filterRetreats(status, btn) {
  // Visual only filter - re-renders
  document.querySelectorAll('.retreat-card').forEach(el => el.style.display = '');
  if (status !== 'all') {
    document.querySelectorAll('.retreat-card').forEach(el => {
      const pill = el.querySelector('.status-pill');
      if (pill && !pill.classList.contains('status-' + status)) el.style.display = 'none';
    });
  }
  btn.parentElement.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
}

// ═══════════════════════════════════════════════════════════════════════
// REPORTS TAB
// ═══════════════════════════════════════════════════════════════════════
function renderReportsTab() {
  const content = document.getElementById('mainContent');
  const activeGroups = GROUPS.filter(g => g.id !== 'all' && !g.removed);
  const totalPax = activeGroups.reduce((s, g) => s + (g.pax || 0), 0);

  // Dietary summary
  let dVegans = 0, dVeg = 0, dGF = 0, dNut = 0, dShellfish = 0, allergies = [];
  activeGroups.forEach(g => {
    const d = dietaryState[g.id] || {};
    dVegans += d.vegans || 0; dVeg += d.vegetarians || 0; dGF += d.glutenFree || 0;
    dNut += d.nutAllergy || 0; dShellfish += d.shellfishAllergy || 0;
    if (d.allergies) allergies.push(g.short + ': ' + d.allergies);
  });

  // Room utilization
  const roomCounts = {};
  ROOMS.forEach(r => { roomCounts[r] = {}; });
  bookings.forEach(b => {
    if (b.room && ROOMS.includes(b.room) && b.day) {
      if (!roomCounts[b.room][b.day]) roomCounts[b.room][b.day] = 0;
      roomCounts[b.room][b.day]++;
    }
  });

  // Teacher roster
  const teacherMap = {};
  bookings.filter(b => b.teacher && b.category === 'classes').forEach(b => {
    if (!teacherMap[b.teacher]) teacherMap[b.teacher] = 0;
    teacherMap[b.teacher]++;
  });

  let html = '<div style="font-family:Playfair Display,serif;font-size:22px;font-weight:600;margin-bottom:20px">Reports</div>';

  // Total pax
  html += '<div class="report-card"><div class="report-title">Total Pax on Property</div><div class="report-grid">' +
    '<div class="report-stat"><div class="report-stat-value">' + totalPax + '</div><div class="report-stat-label">Total Guests</div></div>' +
    '<div class="report-stat"><div class="report-stat-value">' + activeGroups.length + '</div><div class="report-stat-label">Active Groups</div></div>' +
    '<div class="report-stat"><div class="report-stat-value">' + bookings.length + '</div><div class="report-stat-label">Total Bookings</div></div>' +
    '</div></div>';

  // Dietary summary
  html += '<div class="report-card"><div class="report-title">Dietary Summary (Kitchen Printout)</div>' +
    '<div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:12px">' +
    '<span class="dc-vegan" style="font-size:14px;padding:4px 12px">\u{1F331} ' + dVegans + ' Vegan</span>' +
    '<span class="dc-veg" style="font-size:14px;padding:4px 12px">\u{1F957} ' + dVeg + ' Vegetarian</span>' +
    '<span class="dc-gf" style="font-size:14px;padding:4px 12px">\u{1F33E} ' + dGF + ' Gluten Free</span>' +
    (dNut > 0 ? '<span class="dc-allergy" style="font-size:14px;padding:4px 12px">\u{1F95C} ' + dNut + ' Nut Allergy</span>' : '') +
    (dShellfish > 0 ? '<span class="dc-allergy" style="font-size:14px;padding:4px 12px">\u{1F990} ' + dShellfish + ' Shellfish</span>' : '') +
    '</div>';
  if (allergies.length > 0) {
    html += '<div style="background:#fce4ec;border:1px solid #f48fb1;border-radius:8px;padding:10px 14px;font-size:13px">' +
      '<div style="font-weight:700;color:#c62828;margin-bottom:6px">\u26A0 Allergy Notes</div>' +
      allergies.map(a => '<div>' + a + '</div>').join('') + '</div>';
  }
  html += '<div style="margin-top:12px"><button onclick="window.print()" style="background:var(--text);color:#fff;border:none;padding:8px 18px;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit">\u{1F5A8} Print</button></div></div>';

  // Room utilization
  html += '<div class="report-card"><div class="report-title">Room Utilization by Day</div>' +
    '<table style="width:100%;border-collapse:collapse;font-size:13px"><thead><tr><th style="text-align:left;padding:8px;border-bottom:2px solid var(--border)">Room</th>';
  DAYS.forEach(d => { html += '<th style="text-align:center;padding:8px;border-bottom:2px solid var(--border)">' + d + '</th>'; });
  html += '</tr></thead><tbody>';
  ROOMS.forEach(r => {
    html += '<tr><td style="padding:8px;font-weight:600"><span class="room-tag ' + ROOM_CSS[r] + '" style="font-size:11px;padding:2px 8px">' + r + '</span></td>';
    DAYS.forEach(d => {
      const count = (roomCounts[r] || {})[d] || 0;
      const bg = count > 3 ? '#fde8e8' : count > 1 ? '#fff8e1' : count > 0 ? '#e8f5e9' : '';
      html += '<td style="text-align:center;padding:8px;background:' + bg + '">' + count + '</td>';
    });
    html += '</tr>';
  });
  html += '</tbody></table></div>';

  // Teacher roster
  html += '<div class="report-card"><div class="report-title">Teacher Roster</div>';
  const sortedTeachers = Object.entries(teacherMap).sort((a, b) => b[1] - a[1]);
  if (sortedTeachers.length === 0) {
    html += '<div class="empty-state" style="padding:16px 0">No classes with assigned teachers.</div>';
  } else {
    sortedTeachers.forEach(([name, count]) => {
      html += '<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)">' +
        '<span style="width:10px;height:10px;border-radius:50%;background:' + tColor(name) + ';flex-shrink:0"></span>' +
        '<span style="font-weight:600;flex:1">' + name + '</span>' +
        '<span style="font-size:13px;color:var(--muted)">' + count + ' class' + (count !== 1 ? 'es' : '') + '</span></div>';
    });
  }
  html += '</div>';

  content.innerHTML = html;
}

// ═══════════════════════════════════════════════════════════════════════
// MODALS: BOOKING
// ═══════════════════════════════════════════════════════════════════════
function openModal(id, defaultDay, defaultRoom) {
  editingId = id;
  updateTeacherDatalist();
  // Populate day select
  const daySel = document.getElementById('fieldDay');
  daySel.innerHTML = DAYS.map(d => '<option value="' + d + '">' + (DAY_LABELS[d] || d) + '</option>').join('');
  // Populate group select
  const grpSel = document.getElementById('fieldGroup');
  grpSel.innerHTML = GROUPS.map(g => '<option value="' + g.id + '">' + g.label + (g.pax ? ' (' + g.pax + ' pax)' : '') + '</option>').join('');

  document.getElementById('modalTitle').textContent = id ? 'Edit Booking' : 'Add Booking';
  document.getElementById('deleteBtn').style.display = id ? 'block' : 'none';
  if (id) {
    const b = bookings.find(x => x.id === id);
    if (!b) return;
    document.getElementById('fieldTitle').value = b.title;
    document.getElementById('fieldTeacher').value = b.teacher;
    document.getElementById('fieldDay').value = b.day;
    document.getElementById('fieldRoom').value = b.room;
    document.getElementById('fieldStart').value = b.start;
    document.getElementById('fieldEnd').value = b.end;
    document.getElementById('fieldPax').value = b.pax;
    document.getElementById('fieldNotes').value = b.notes;
    document.getElementById('fieldStatus').value = b.status;
    document.getElementById('fieldCategory').value = b.category || 'classes';
    document.getElementById('fieldGroup').value = b.group || 'all';
    document.getElementById('fieldPrice').value = b.price || '';
    document.getElementById('fieldOptional').checked = b.optional || false;
    document.getElementById('fieldShared').checked = b.is_shared || false;
  } else {
    document.getElementById('fieldTitle').value = '';
    document.getElementById('fieldTeacher').value = '';
    document.getElementById('fieldDay').value = defaultDay || activeDay || DAYS[0] || '';
    document.getElementById('fieldRoom').value = defaultRoom || 'Heaven';
    document.getElementById('fieldStart').value = '08:00';
    document.getElementById('fieldEnd').value = '09:30';
    document.getElementById('fieldPax').value = '';
    document.getElementById('fieldNotes').value = '';
    document.getElementById('fieldStatus').value = 'confirmed';
    document.getElementById('fieldCategory').value = activeCategory !== 'all' ? activeCategory : 'classes';
    document.getElementById('fieldGroup').value = String(activeGroup) !== 'all' ? activeGroup : 'all';
    document.getElementById('fieldPrice').value = '';
    document.getElementById('fieldOptional').checked = false;
    document.getElementById('fieldShared').checked = false;
  }
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); editingId = null; }

async function saveBooking() {
  const grpVal = document.getElementById('fieldGroup').value;
  const isShared = document.getElementById('fieldShared').checked || grpVal === 'all';
  const dayVal = document.getElementById('fieldDay').value;
  const data = {
    action: 'saveBooking',
    title: document.getElementById('fieldTitle').value.trim() || 'Untitled',
    teacher_name: document.getElementById('fieldTeacher').value.trim(),
    day_date: dayToDateStr(dayVal),
    start_time: document.getElementById('fieldStart').value,
    end_time: document.getElementById('fieldEnd').value,
    room: document.getElementById('fieldRoom').value,
    pax: parseInt(document.getElementById('fieldPax').value) || 0,
    setup_notes: document.getElementById('fieldNotes').value.trim(),
    status: document.getElementById('fieldStatus').value,
    category: document.getElementById('fieldCategory').value,
    group_id: getApiGroupId(grpVal),
    is_shared: isShared,
    is_optional: document.getElementById('fieldOptional').checked,
    price: document.getElementById('fieldPrice').value.trim(),
    subtitle: '',
  };
  if (editingId) data.id = editingId;

  // Optimistic local update
  const localBooking = {
    id: editingId || Date.now(),
    group: grpVal,
    day: dayVal,
    day_date: data.day_date,
    start: data.start_time,
    end: data.end_time,
    title: data.title,
    subtitle: '',
    teacher: data.teacher_name,
    room: data.room,
    pax: data.pax,
    notes: data.setup_notes,
    status: data.status,
    category: data.category,
    optional: data.is_optional,
    price: data.price,
    is_shared: data.is_shared,
  };

  if (editingId) {
    const idx = bookings.findIndex(b => b.id === editingId);
    if (idx >= 0) bookings[idx] = { ...bookings[idx], ...localBooking };
  } else {
    bookings.push(localBooking);
  }
  closeModal();
  render();

  // API call
  const result = await apiPost(data);
  if (result.success) {
    showToast('\u2713 Saved');
    if (!editingId && result.data && result.data.id) {
      const b = bookings.find(x => x.id === localBooking.id);
      if (b) b.id = result.data.id;
    }
  } else {
    showToast('Error: ' + (result.error || 'Save failed'));
  }
}

async function deleteBooking() {
  if (!editingId) return;
  if (!confirm('Delete this booking?')) return;
  const id = editingId;
  bookings = bookings.filter(b => b.id !== id);
  closeModal();
  render();
  const result = await apiPost({ action: 'deleteBooking', id: id });
  if (result.success) showToast('\u2713 Deleted');
  else showToast('Error: ' + (result.error || 'Delete failed'));
}

// ═══════════════════════════════════════════════════════════════════════
// MODALS: RETREAT
// ═══════════════════════════════════════════════════════════════════════
function openRetreatModal(id) {
  editingRetreatId = id || null;
  document.getElementById('retreatModalTitle').textContent = id ? 'Edit Retreat' : 'New Retreat';
  if (id) {
    const r = RETREATS.find(x => String(x.id) === String(id));
    if (r) {
      document.getElementById('retreatName').value = r.name || '';
      document.getElementById('retreatStart').value = (r.week_start || '').slice(0, 10);
      document.getElementById('retreatEnd').value = (r.week_end || '').slice(0, 10);
      document.getElementById('retreatNotes').value = r.notes || '';
    }
  } else {
    document.getElementById('retreatName').value = '';
    document.getElementById('retreatStart').value = '';
    document.getElementById('retreatEnd').value = '';
    document.getElementById('retreatNotes').value = '';
  }
  document.getElementById('retreatModalOverlay').classList.add('open');
}

function closeRetreatModal() { document.getElementById('retreatModalOverlay').classList.remove('open'); }

async function saveRetreat() {
  const data = {
    action: 'saveRetreat',
    name: document.getElementById('retreatName').value.trim() || 'Untitled Retreat',
    week_start: document.getElementById('retreatStart').value,
    week_end: document.getElementById('retreatEnd').value,
    notes: document.getElementById('retreatNotes').value.trim(),
  };
  if (editingRetreatId) data.id = editingRetreatId;
  closeRetreatModal();
  const result = await apiPost(data);
  if (result.success) {
    showToast('\u2713 Retreat saved');
    if (result.data && result.data.id) activeRetreatId = result.data.id;
    await loadAllData(activeRetreatId);
    render();
  } else {
    showToast('Error: ' + (result.error || 'Save failed'));
  }
}

// ═══════════════════════════════════════════════════════════════════════
// MODALS: GROUP
// ═══════════════════════════════════════════════════════════════════════
let addingGroupRetreatId = null;
function openGroupModal(retreatId) {
  addingGroupRetreatId = retreatId;
  document.getElementById('groupName').value = '';
  document.getElementById('groupPax').value = '';
  document.getElementById('groupColor').value = NW_PALETTE[GROUPS.length % NW_PALETTE.length];
  document.getElementById('groupArrival').value = '';
  document.getElementById('groupDeparture').value = '';
  document.getElementById('groupPackage').value = '';
  // Populate teacher select
  const sel = document.getElementById('groupTeacher');
  sel.innerHTML = '<option value="">None</option>' + TEACHERS.map(t => '<option value="' + t.id + '">' + t.name + '</option>').join('');

  const r = RETREATS.find(x => String(x.id) === String(retreatId));
  if (r) {
    document.getElementById('groupArrival').value = (r.week_start || '').slice(0, 10);
    document.getElementById('groupDeparture').value = (r.week_end || '').slice(0, 10);
  }
  document.getElementById('groupModalOverlay').classList.add('open');
}

function closeGroupModal() { document.getElementById('groupModalOverlay').classList.remove('open'); }

async function saveGroup() {
  const data = {
    action: 'saveGroup',
    retreat_id: addingGroupRetreatId,
    name: document.getElementById('groupName').value.trim() || 'New Group',
    pax: parseInt(document.getElementById('groupPax').value) || 0,
    color: document.getElementById('groupColor').value,
    arrival_date: document.getElementById('groupArrival').value,
    departure_date: document.getElementById('groupDeparture').value,
    teacher_id: document.getElementById('groupTeacher').value || '',
    package_type: document.getElementById('groupPackage').value.trim(),
  };
  closeGroupModal();
  const result = await apiPost(data);
  if (result.success) {
    showToast('\u2713 Group saved');
    await loadAllData(activeRetreatId);
    render();
  } else {
    showToast('Error: ' + (result.error || 'Save failed'));
  }
}

// ═══════════════════════════════════════════════════════════════════════
// FORM / SUBMISSIONS
// ═══════════════════════════════════════════════════════════════════════
async function sendForm(groupId) {
  const result = await apiPost({ action: 'sendFormEmail', group_id: groupId });
  if (result.success) {
    showToast('\u2713 Form sent to ' + (result.data.email || 'teacher'));
    await loadAllData(activeRetreatId);
    render();
  } else {
    showToast('Error: ' + (result.error || 'Send failed'));
  }
}

function openReviewModal(submissionId) {
  reviewingSubmissionId = submissionId;
  const sub = PENDING_SUBMISSIONS.find(s => String(s.id) === String(submissionId));
  const rc = document.getElementById('reviewContent');
  if (!sub) { rc.innerHTML = '<div class="empty-state">Submission not found.</div>'; }
  else {
    let formData = {};
    try { formData = JSON.parse(sub.form_data_json || '{}'); } catch (e) {}
    const group = GROUPS.find(g => String(g.id) === String(sub.group_id));
    rc.innerHTML = '<div style="margin-bottom:16px"><strong>Group:</strong> ' + (group ? group.label : 'Unknown') + '</div>' +
      '<div style="margin-bottom:16px"><strong>Submitted:</strong> ' + (sub.submitted_at || 'N/A') + '</div>' +
      '<div style="margin-bottom:16px"><strong>Dietary:</strong> ' + (sub.vegans || 0) + ' vegan, ' + (sub.vegetarians || 0) + ' veg, ' + (sub.gluten_free || 0) + ' GF</div>' +
      (sub.allergies ? '<div style="margin-bottom:16px"><strong>Allergies:</strong> ' + sub.allergies + '</div>' : '') +
      (sub.equipment_notes ? '<div style="margin-bottom:16px"><strong>Equipment:</strong> ' + sub.equipment_notes + '</div>' : '') +
      (sub.general_notes ? '<div style="margin-bottom:16px"><strong>Notes:</strong> ' + sub.general_notes + '</div>' : '') +
      '<div style="background:var(--bg);border-radius:8px;padding:12px;font-size:12px;max-height:200px;overflow-y:auto"><pre style="white-space:pre-wrap">' + JSON.stringify(formData, null, 2) + '</pre></div>';
  }
  document.getElementById('reviewModalOverlay').classList.add('open');
}

function closeReviewModal() { document.getElementById('reviewModalOverlay').classList.remove('open'); reviewingSubmissionId = null; }

async function approveSubmission() {
  if (!reviewingSubmissionId) return;
  closeReviewModal();
  const result = await apiPost({ action: 'approveSubmission', submission_id: reviewingSubmissionId });
  if (result.success) {
    showToast('\u2713 Approved \u2014 ' + (result.data.bookings_created || 0) + ' bookings created');
    await loadAllData(activeRetreatId);
    render();
  } else {
    showToast('Error: ' + (result.error || 'Approve failed'));
  }
}

async function declineSubmission() {
  if (!reviewingSubmissionId) return;
  const note = prompt('Decline reason (optional):');
  closeReviewModal();
  const result = await apiPost({ action: 'declineSubmission', submission_id: reviewingSubmissionId, note: note || '' });
  if (result.success) {
    showToast('\u2713 Declined');
    await loadAllData(activeRetreatId);
    render();
  } else {
    showToast('Error: ' + (result.error || 'Decline failed'));
  }
}


// ═══════════════════════════════════════════════════════════════════════
// TAB SWITCHING & CONTROLS
// ═══════════════════════════════════════════════════════════════════════
function switchTopTab(tab) {
  activeTopTab = tab;
  document.querySelectorAll('#topTabs .tab').forEach((t, i) => {
    t.classList.toggle('active', (i === 0 && tab === 'week') || (i === 1 && tab === 'retreats') || (i === 2 && tab === 'reports'));
  });
  const weekControls = document.getElementById('weekViewControls');
  const weekSubTabs = document.getElementById('weekSubTabs');
  if (tab === 'week') {
    weekControls.style.display = '';
    weekSubTabs.style.display = '';
    render();
  } else {
    weekControls.style.display = 'none';
    weekSubTabs.style.display = 'none';
    if (tab === 'retreats') renderRetreatsTab();
    else if (tab === 'reports') renderReportsTab();
  }
}

function switchWeekSub(tab) {
  activeTab = tab;
  document.querySelectorAll('#weekSubTabs .tab').forEach((t, i) => {
    t.classList.toggle('active', (i === 0 && tab === 'day') || (i === 1 && tab === 'room') || (i === 2 && tab === 'teacher'));
  });
  render();
}

function setCat(c) { activeCategory = c; render(); }
function setGroup(g) { activeGroup = g; render(); }
function setDay(d) { activeDay = d; render(); }
function setRoom(r) { activeRoom = r; render(); }
function setTeacher(t) { activeTeacher = t; render(); }
function onTeacherSearch(val) {
  teacherSearchQuery = val; activeTeacher = 'All'; render();
  setTimeout(function() { const el = document.getElementById('teacherSearch'); if (el) { el.focus(); el.setSelectionRange(el.value.length, el.value.length); } }, 10);
}
function clearTeacherSearch() { teacherSearchQuery = ''; activeTeacher = 'All'; render(); }

// ═══════════════════════════════════════════════════════════════════════
// MAIN RENDER
// ═══════════════════════════════════════════════════════════════════════
function render() {
  if (activeTopTab !== 'week') return;
  renderGroupBar();
  renderCatTabs();
  renderFilterBar();
  setTimeout(updateConflictPill, 0);
  if (activeTab === 'day') renderByDay();
  else if (activeTab === 'room') renderByRoom();
  else renderByTeacher();
}

// ═══════════════════════════════════════════════════════════════════════
// MODAL OVERLAY CLOSE HANDLERS
// ═══════════════════════════════════════════════════════════════════════
document.getElementById('modalOverlay').addEventListener('click', function(e) { if (e.target === this) closeModal(); });
document.getElementById('retreatModalOverlay').addEventListener('click', function(e) { if (e.target === this) closeRetreatModal(); });
document.getElementById('groupModalOverlay').addEventListener('click', function(e) { if (e.target === this) closeGroupModal(); });
document.getElementById('reviewModalOverlay').addEventListener('click', function(e) { if (e.target === this) closeReviewModal(); });

// ═══════════════════════════════════════════════════════════════════════
// AUTO-SYNC & DEPARTURE CHECK
// ═══════════════════════════════════════════════════════════════════════
setInterval(function() {
  loadAllData(activeRetreatId).then(function() {
    if (activeTopTab === 'week') render();
    else if (activeTopTab === 'retreats') renderRetreatsTab();
    else if (activeTopTab === 'reports') renderReportsTab();
  });
}, CONFIG.SYNC_INTERVAL);

setInterval(function() {
  let changed = false;
  GROUPS.forEach(g => {
    if (g.id === 'all' || g.removed) return;
    if (groupStatus(g) === 'departed' && !g.autoDeparted) {
      g.autoDeparted = true;
      changed = true;
    }
  });
  if (changed) render();
}, 60000);

// ═══════════════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════════════
(async function init() {
  try {
    // First load all retreats
    const result = await apiGet({ action: 'all' });
    if (result.success && result.data) {
      const retreats = result.data.retreats || [];
      // Pick active or most recent upcoming retreat
      let selected = retreats.find(r => r.status === 'active');
      if (!selected) selected = retreats.find(r => r.status === 'upcoming');
      if (!selected && retreats.length > 0) selected = retreats[0];
      if (selected) activeRetreatId = selected.id;

      // Now load with retreat filter
      await loadAllData(activeRetreatId);
    }
  } catch (e) {
    console.error('Init error:', e);
    setSyncStatus('Connection failed');
  }

  // Hide loading overlay
  const overlay = document.getElementById('loadingOverlay');
  if (overlay) overlay.style.display = 'none';

  // Show week sub tabs
  document.getElementById('weekSubTabs').style.display = '';

  render();
})();

</script>
